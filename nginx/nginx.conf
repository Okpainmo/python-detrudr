# =========================
# GLOBAL JSON ACCESS LOGS (REQUIRED)
# =========================
log_format json_combined escape=json
'{'
  '"source_ip":"$remote_addr",'
  '"timestamp":"$time_iso8601",'
  '"method":"$request_method",'
  '"path":"$request_uri",'
  '"status":$status,'
  '"response_size":$body_bytes_sent'
'}';

access_log /var/log/nginx/hng-access.log json_combined;


# =========================
# HTTP → HTTPS REDIRECT (ALL DOMAINS)
# =========================
server {
    listen 80;
    server_name nextcloud.xentoprotocol.xyz detrudr.xentoprotocol.xyz;

    return 301 https://$host$request_uri;
}


# =========================
# DETRUDR DASHBOARD (HTTPS)
# =========================
server {
    listen 443 ssl;
    server_name detrudr.xentoprotocol.xyz;

    ssl_certificate /etc/letsencrypt/live/detrudr.xentoprotocol.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/detrudr.xentoprotocol.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # REQUIRED for detector accuracy
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


# =========================
# NEXTCLOUD (HTTPS)
# =========================
server {
    listen 443 ssl;
    server_name nextcloud.xentoprotocol.xyz;

    ssl_certificate /etc/letsencrypt/live/nextcloud.xentoprotocol.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextcloud.xentoprotocol.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # REQUIRED for logging + detection engine
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

