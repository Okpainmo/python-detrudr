services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  detector:
    build:
      context: ./detector
    container_name: detrudr-detector
    restart: unless-stopped
    env_file:
      - ./detector/.env
    network_mode: host
    cap_add:
      - NET_ADMIN
    depends_on:
      nextcloud:
        condition: service_healthy
    volumes:
      - ./detector/config.yaml:/app/config.yaml:ro
      - HNG-nginx-logs:/var/log/nginx:ro
      - detector-audit:/tmp
    environment:
      PYTHONUNBUFFERED: "1"
    command: ["python3", "main.py"]

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/detrudr/nginx-logs
  detector-audit:
    name: detrudr-audit
